<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
    <h2>Регистрация нового пользователя</h2>

    <form method="post">
        <!-- Защита от CSRF-атак, обязательна в Django для POST-форм -->
        {% csrf_token %}
        
        <!-- Вывод полей формы в виде абзацев <p> -->
        {{ form.as_p }}
        
        <button type="submit">Зарегистрироваться</button>
    </form>

    <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</body>
</html>
