{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg" style="border-radius: 1rem; overflow: hidden;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-2">Регистрация</h2>
                    <p class="text-muted mb-0">Создайте аккаунт, чтобы участвовать в сообществах и делиться постами.</p>
                </div>

                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Зарегистрироваться</button>
                </form>

                <p class="mt-4 mb-0 text-center">Уже есть аккаунт? <a href="{% url 'account_login' %}">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
