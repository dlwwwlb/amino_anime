{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
    <h1>Создать сообщество</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-success">Создать</button>
    </form>
{% endblock %}
